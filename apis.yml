aid: m-t-bank
url: https://raw.githubusercontent.com/api-evangelist/m-t-bank/refs/heads/main/apis.yml
name: M&T Bank
kind: company
description: >-
  M&T Bank is a US super-regional bank holding company (M&T Bank Corporation,
  NYSE: MTB) headquartered in Buffalo, New York, operating through its national
  bank subsidiary Manufacturers and Traders Trust Company. With roughly $200
  billion in assets it is one of the twenty largest US commercial banks, serving
  consumers, businesses, and institutional clients across the eastern United
  States, and it owns Wilmington Trust, its custody, fund-administration, and
  wealth arm. Unlike UK/AU open banking there is no single mandated contract in
  the US, so M&T's public API posture is split: it runs a real first-party
  Developer Portal / "API Store" at developer.mtb.com for institutional and
  wholesale clients (Banking & Treasury plus Wilmington Trust Custody APIs),
  gated behind Microsoft Entra login and Azure API Management subscription keys
  with per-product OpenAPI reference available only after authentication.
  Consumer-permissioned account data is shared through aggregators (Plaid) rather
  than a public first-party consumer API. No public FDX conformance or CFPB
  Section 1033 data-access API is documented on the portal at review time.
